<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 830" font-family="'Hiragino Sans','Microsoft JhengHei',sans-serif">
  <defs>
    <style>
      .zname { fill:#fff; font-weight:700; }
      .ord { fill:#fff; font-size:15px; font-weight:800; text-anchor:middle; }
      .ordc { stroke:#fff; stroke-width:2; }
    </style>
  </defs>

  <!-- 底 -->
  <rect x="6" y="6" width="628" height="772" rx="26" fill="#eaf3ec" stroke="#cfe0d4" stroke-width="2"/>
  <text x="24" y="40" fill="#23303a" font-size="21" font-weight="800">USJ 園區分區・建議動線（示意圖）</text>
  <text x="24" y="62" fill="#8a7a55" font-size="12.5">＊依官方地圖配置簡化、非比例精確；實際導航請以官方 App／園區地圖為準。</text>

  <!-- 中央水域（示意） -->
  <ellipse cx="345" cy="300" rx="120" ry="78" fill="#bfe3f0" stroke="#a4d2e4" stroke-width="2" opacity="0.85"/>

  <!-- 小小兵樂園（上） -->
  <rect x="175" y="120" width="150" height="50" rx="13" fill="#e0a92b" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="250" y="151" font-size="16" text-anchor="middle">小小兵樂園</text>

  <!-- 舊金山區域（中上） -->
  <rect x="218" y="208" width="140" height="44" rx="13" fill="#b5613a" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="288" y="236" font-size="15" text-anchor="middle">舊金山區域</text>

  <!-- 紐約區域（左） -->
  <rect x="58" y="224" width="140" height="50" rx="13" fill="#2f6e3f" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="128" y="254" font-size="15" text-anchor="middle">紐約區域</text>

  <!-- 侏羅紀公園（右） -->
  <rect x="398" y="270" width="150" height="52" rx="13" fill="#3f9e5a" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="473" y="302" font-size="15" text-anchor="middle">侏羅紀公園</text>

  <!-- 親善村（中・大白鯊） -->
  <rect x="262" y="352" width="138" height="44" rx="13" fill="#7a8690" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="331" y="380" font-size="15" text-anchor="middle">親善村・大白鯊</text>

  <!-- 水世界（右下） -->
  <rect x="470" y="396" width="120" height="44" rx="13" fill="#2a7fa6" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="530" y="424" font-size="15" text-anchor="middle">水世界</text>

  <!-- 好萊塢區域（左下） -->
  <rect x="34" y="440" width="156" height="54" rx="13" fill="#8a4fd0" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="112" y="467" font-size="15" text-anchor="middle">好萊塢區域</text>
  <text x="112" y="485" fill="#efe6ff" font-size="11" text-anchor="middle">美夢飛車</text>

  <!-- 環球奇境（中） -->
  <rect x="196" y="476" width="156" height="48" rx="13" fill="#2bb2c9" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="274" y="505" font-size="15" text-anchor="middle">環球奇境（親子）</text>

  <!-- 超級任天堂世界（右下） -->
  <rect x="392" y="528" width="186" height="54" rx="13" fill="#d6485f" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="485" y="555" font-size="15" text-anchor="middle">超級任天堂世界™</text>
  <text x="485" y="573" fill="#ffe6ea" font-size="11" text-anchor="middle">瑪利歐賽車・咚奇剛</text>

  <!-- 哈利波特（下中） -->
  <rect x="196" y="590" width="208" height="54" rx="13" fill="#3a3a6b" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="300" y="617" font-size="15" text-anchor="middle">哈利波特魔法世界™</text>
  <text x="300" y="635" fill="#dcdcf2" font-size="11" text-anchor="middle">禁忌之旅・活米村</text>

  <!-- 入口（左下） -->
  <rect x="30" y="656" width="166" height="56" rx="13" fill="#3a4a52" stroke="#fff" stroke-width="2"/>
  <text class="zname" x="113" y="682" font-size="15" text-anchor="middle">🎡 入口 / 大門</text>
  <text x="113" y="701" fill="#c9d3d8" font-size="10.5" text-anchor="middle">出園即環球城市步道</text>

  <!-- 建議順序徽章 -->
  <g>
    <circle class="ordc" cx="48"  cy="670" r="15" fill="#3a4a52"/><text class="ord" x="48"  y="675">1</text>
    <circle class="ordc" cx="410" cy="542" r="15" fill="#b83149"/><text class="ord" x="410" y="547">2</text>
    <circle class="ordc" cx="214" cy="604" r="15" fill="#2c2c55"/><text class="ord" x="214" y="609">3</text>
    <circle class="ordc" cx="416" cy="284" r="15" fill="#2c7d44"/><text class="ord" x="416" y="289">5</text>
    <circle class="ordc" cx="50"  cy="454" r="15" fill="#6f3bb0"/><text class="ord" x="50"  y="459">6</text>
    <circle class="ordc" cx="192" cy="134" r="15" fill="#b9881f"/><text class="ord" x="192" y="139">7</text>
    <circle class="ordc" cx="278" cy="366" r="15" fill="#5f6b75"/><text class="ord" x="278" y="371">8</text>
  </g>

  <!-- 圖例 -->
  <text x="24" y="744" fill="#5c6b73" font-size="11.5">建議順序：1 入園 → 2 任天堂 → 3 哈利波特 →（4 午餐）→ 5 侏羅紀 → 6 好萊塢 → 7 小小兵 → 8 大白鯊 →（夜間遊行/城市步道）</text>
  <text x="24" y="764" fill="#8a7a55" font-size="11">＊午後人潮高峰可改看表演；閉園前 1 小時熱門設施排隊驟減，適合回刷。</text>
</svg>
